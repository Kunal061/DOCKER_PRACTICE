services:
  db:
    image: mongo:7-jammy
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - db_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --username \"$MONGO_INITDB_ROOT_USERNAME\" --password \"$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval \"db.runCommand({ ping: 1 }).ok\" --quiet | grep 1"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    environment:
      PORT: 8080
      MONGO_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@db:27017/${MONGO_DB}?authSource=admin
      CORS_ORIGIN: "*"
    ports:
      - "${API_PORT}:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
    ports:
      - "${WEB_PORT}:80"
    depends_on:
      - api

volumes:
  db_data:
