services:
  db:
    image: mongo:7-jammy
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-app}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-app}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-app_password_change_me}
    volumes:
      - db_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --username \"$$MONGO_INITDB_ROOT_USERNAME\" --password \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval \"db.runCommand({ ping: 1 }).ok\" --quiet | grep 1"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    environment:
      PORT: 8080
      MONGO_URL: mongodb://${MONGO_USER:-app}:${MONGO_PASSWORD:-app_password_change_me}@db:27017/${MONGO_DB:-app}?authSource=admin
      CORS_ORIGIN: "*"
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - api

  # Optional MongoDB UI (similar to an "Atlas-like" browsing experience).
  # For EC2 safety, this is bound to localhost. Use an SSH tunnel to access it.
  mongo-express:
    image: mongo-express:1.0.2-20
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-app}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-app_password_change_me}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER:-app}:${MONGO_PASSWORD:-app_password_change_me}@db:27017/${MONGO_DB:-app}?authSource=admin
      ME_CONFIG_BASICAUTH: "true"
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_USER:-app}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_PASSWORD:-app_password_change_me}
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
